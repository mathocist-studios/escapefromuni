# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-25.12, windows-2026, macos-15]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Change wrapper permissions
      run: chmod +x ./gradlew

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    - name: Upload JaCoCo coverage report as a workflow artifact
      uses: actions/upload-artifact@v4.3.1
      with:
        name: jacoco-report-${{ matrix.os }}
        path: triangle/lib/build/reports/jacoco/test/html/
        # Keep the JAR for a week, to manage quota usage
        retention-days: 1

    - name: Upload library JAR
      uses: actions/upload-artifact@v4.3.1
      with:
        name: lib-${{ matrix.os }}.jar
        path: triangle/lib/build/libs/lib.jar
        retention-days: 1
    - name: Upload Checkstyle report
      uses: actions/upload-artifact@v4.3.1
      if: startsWith(matrix.os, 'ubuntu')
      with:
        name: checkstyle-report
        path: triangle/lib/build/reports/checkstyle
        retention-days: 1
    

    # NOTE: The Gradle Wrapper is the default and recommended way to run Gradle (https://docs.gradle.org/current/userguide/gradle_wrapper.html).
    # If your project does not have the Gradle Wrapper configured, you can use the following configuration to run Gradle with a specified version.
    #
    # - name: Setup Gradle
    #   uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
    #   with:
    #     gradle-version: '8.9'
    #
    # - name: Build with Gradle 8.9
    #   run: gradle build

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
      with:
        build-root-directory: triangle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Change wrapper permissions
      run: chmod +x ./gradlew

    # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
    # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
      
  release:
    runs-on: ubuntu-25.12
    needs: [ "build" ]
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
    - name: Download Ubuntu Build Artifact
      uses: actions/download-artifact@v4.1.4
      with:
        name: lib-ubuntu-2026.jar
    - name: Rename Ubuntu Build Artifact
      run: mv lib.jar lib-ubuntu.jar
    - name: Download MacOS Build Artifact
      uses: actions/download-artifact@v4.1.4
      with:
        name: lib-macos-15.jar
    - name: Rename MacOS Build Artifact
      run: mv lib.jar lib-macos.jar
    - name: Download Windows Build Artifact
      uses: actions/download-artifact@v4.1.4
      with:
        name: lib-windows-2026.jar
    - name: Rename Windows Build Artifact
      run: mv lib.jar lib-windows.jar
    - name: Release
      uses: softprops/action-gh-release@9d7c94cfd0a1f3ed45544c887983e9fa900f0564
      with:
        files: lib*.jar


