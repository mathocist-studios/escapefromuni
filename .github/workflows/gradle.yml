name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 17 * * 1'  # Every Monday at 17:00 UTC

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu, windows, macos]
    runs-on: ${{ matrix.os }}-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          path: triangle/lib/build/reports/jacoco/test/html/
          retention-days: 1

      - name: Upload library JAR
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.os }}.jar
          path: triangle/lib/build/libs/lib.jar
          retention-days: 1

      - name: Upload Checkstyle report
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: triangle/lib/build/reports/checkstyle
          retention-days: 1

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
        with:
          build-root-directory: triangle

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Ubuntu Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: lib-ubuntu.jar

      - name: Download MacOS Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: lib-macos.jar

      - name: Download Windows Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: lib-windows.jar

      - name: Generate tag for scheduled release
        if: github.event_name == 'schedule'
        run: |
          TAG=weekly-$(date +'%Y-%m-%d')
          git tag $TAG
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG || github.ref_name }}
          name: Release ${{ env.TAG || github.ref_name }}
          files: lib*.jar